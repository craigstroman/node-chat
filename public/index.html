<!DOCTYPE html>
<!--[if lt IE 7]>      <html class="no-js lt-ie9 lt-ie8 lt-ie7"> <![endif]-->
<!--[if IE 7]>         <html class="no-js lt-ie9 lt-ie8"> <![endif]-->
<!--[if IE 8]>         <html class="no-js lt-ie9"> <![endif]-->
<!--[if gt IE 8]><!--> <html class="no-js"> <!--<![endif]-->
    <head>
        <meta charset="utf-8"/>
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
        <title></title>
        <meta name="description" content=""/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <link href="/bower_components/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet"/>
        <link href="/bower_components/ladda/dist/ladda-themeless.min.css" rel="stylesheet"/>
        <link href="/css/main.css" rel="stylesheet"/>       
    </head>
    <body>
        <div id="container" class="container"></div>

        <script type="text/template" id="login-template">
            <div class="row">
                <div class="col-md-4 col-md-offset-4 text-center">
                    <div class="well">
                        <div class="form-group <% if (error)  {%>has-error<% } %>">
                            <label> Name </label>
                            <input type="text" class="form-control" id="nameText" placeholder="Enter your name">

                            <label class="control-label"> <%= error %> </label>

                            <br/>
                            <button type="button" id="nameBtn" class="btn btn-primary btn-lg ladda-button" data-size="l" data-style="zoom-out">
                                <span class="ladda-label">Login</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </script>        

        <script type="text/template" id="home-template">
            <div class="row chat-room-loby">
                <div class="col-md-10 chat-room-area">
                    <div class="panel panel-default chat-room-panel">
                        <div class="panel-heading">Loby</div>
                        <div class="panel-body chat-room-text">
                                <ul id="chatList"></ul>
                        </div>
                        <div class="panel-footer">
                            <form>
                                <input type="text" name="chatInput" id="chatInput" class="form-control" placeholder="Enter chat message here."  aria-labelby="Enter chat message here." tabindex="0" />
                            </form>                            
                        </div>
                    </div>
                </div>
                <div class="col-md-2 users-area">
                    <div class="panel panel-default online-users">
                        <div class="panel-heading">
                            <h3 class="panel-title">Online Users <span class="badge pull-right" id="userCount"></span></h3>
                        </div>
                        <div class="panel-body">
                            <div class="list-group" id="userList"></div>
                        </div>
                    </div>
                </div>
            </div>
        </script>                
        <script src="/socket.io/socket.io.js"></script>

        <script src="/bower_components/jquery/dist/jquery.min.js"></script>
        <script src="/bower_components/bootstrap/dist/js/bootstrap.min.js"></script>

        <!-- Loading Plugin for bootstrap -->
        <script src="/bower_components/ladda/dist/spin.min.js"></script>
        <script src="/bower_components/ladda/dist/ladda.min.js"></script>

        <script src="/bower_components/underscore/underscore-min.js"></script>
        <script src="/bower_components/backbone/backbone-min.js"></script>

        <script src="/js/models/main.js"></script>
        <script src="/js/views/main.js"></script>

        <script src="/js/socketclient.js"></script>

        <script src="/js/main.js"></script>    
    </body>
</html>
